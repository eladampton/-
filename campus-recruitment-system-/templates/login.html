{% extends 'base.html' %}

{% block title %}用户登录 - 智配校招{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="login-icon mb-3">
                            <i class="bi bi-person-circle display-1 text-primary"></i>
                        </div>
                        <h2 class="fw-bold">用户登录</h2>
                        <p class="text-muted">欢迎回到智配校招</p>
                    </div>

                    <form method="POST" action="{{ url_for('public.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person me-2"></i>用户名
                            </label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username"
                                   placeholder="请输入用户名" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock me-2"></i>密码
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password"
                                   placeholder="请输入密码" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>登录
                            </button>
                        </div>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="text-muted mb-0">
                            还没有账号？
                            <a href="{{ url_for('public.register') }}" class="text-decoration-none fw-bold">立即注册</a>
                        </p>
                    </div>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted small mb-2">测试账号</p>
                        <div class="d-flex justify-content-center gap-2 flex-wrap">
                            <span class="badge bg-primary">admin/admin123</span>
                            <span class="badge bg-success">hr/hr123</span>
                            <span class="badge bg-info">user/user123</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.card {
    border-radius: 16px;
}
.form-control {
    border-radius: 8px;
    padding: 12px 16px;
}
.form-control:focus {
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    border-color: #667eea;
}
.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
}
.btn-primary:hover {
    background: linear-gradient(135deg, #5a67d8 0%, #6b46a1 100%);
}
</style>
{% endblock %}
