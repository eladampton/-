{% extends 'base.html' %}

{% block title %}用户注册 - 智配校招{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="bi bi-person-plus display-1 text-primary"></i>
                        </div>
                        <h2 class="fw-bold">用户注册</h2>
                        <p class="text-muted">加入智配校招，开启求职之旅</p>
                    </div>

                    <form method="POST" action="{{ url_for('public.register') }}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="用于登录" required>
                            </div>
                            <div class="col-md-6">
                                <label for="name" class="form-label">真实姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name"
                                       placeholder="请输入真实姓名" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="至少6位" required>
                            </div>
                            <div class="col-md-6">
                                <label for="confirm_password" class="form-label">确认密码 <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                       placeholder="再次输入密码" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label for="phone" class="form-label">手机号码</label>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                       placeholder="用于接收通知">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">电子邮箱</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       placeholder="your@email.com">
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">注册身份 <span class="text-danger">*</span></label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="form-check custom-card p-3 border rounded">
                                        <input class="form-check-input" type="radio" name="role" id="role_user"
                                               value="user" checked>
                                        <label class="form-check-label w-100" for="role_user">
                                            <i class="bi bi-person-workspace me-2"></i>求职者
                                        </label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check custom-card p-3 border rounded">
                                        <input class="form-check-input" type="radio" name="role" id="role_hr"
                                               value="hr">
                                        <label class="form-check-label w-100" for="role_hr">
                                            <i class="bi bi-building me-2"></i>企业HR
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3" id="company_field" style="display:none;">
                            <label for="company" class="form-label">公司名称</label>
                            <input type="text" class="form-control" id="company" name="company"
                                   placeholder="请输入公司名称">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-plus me-2"></i>注册
                            </button>
                        </div>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="text-muted mb-0">
                            已有账号？
                            <a href="{{ url_for('public.login') }}" class="text-decoration-none fw-bold">立即登录</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 显示/隐藏公司名称输入框
document.querySelectorAll('input[name="role"]').forEach(radio => {
    radio.addEventListener('change', function() {
        const companyField = document.getElementById('company_field');
        if (this.value === 'hr') {
            companyField.style.display = 'block';
        } else {
            companyField.style.display = 'none';
        }
    });
});
</script>

<style>
.custom-card {
    cursor: pointer;
    transition: all 0.3s;
}
.custom-card:hover {
    border-color: #667eea !important;
    background-color: #f8f9ff;
}
.form-check-input:checked + .form-check-label {
    color: #667eea;
}
</style>
{% endblock %}
