{% extends 'base.html' %}

{% block title %}{% if resume %}编辑简历{% else %}创建简历{% endif %} - 智配校招{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-file-earmark-text me-2"></i>
                        {% if resume %}编辑简历{% else %}创建简历{% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% if resume %}{{ url_for('seeker.resume_edit', resume_id=resume.id) }}{% else %}{{ url_for('seeker.resume_create') }}{% endif %}">
                        <!-- 基本信息 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-person me-2"></i>基本信息
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="real_name" class="form-label">真实姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="real_name" name="real_name"
                                       value="{{ resume.real_name if resume else '' }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">性别</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="">请选择</option>
                                    <option value="男" {% if resume and resume.gender == '男' %}selected{% endif %}>男</option>
                                    <option value="女" {% if resume and resume.gender == '女' %}selected{% endif %}>女</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="age" class="form-label">年龄</label>
                                <input type="number" class="form-control" id="age" name="age" min="16" max="60"
                                       value="{{ resume.age if resume else '' }}">
                            </div>
                            <div class="col-md-4">
                                <label for="phone" class="form-label">手机号码</label>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                       value="{{ resume.phone if resume else '' }}">
                            </div>
                            <div class="col-md-4">
                                <label for="email" class="form-label">电子邮箱</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       value="{{ resume.email if resume else '' }}">
                            </div>
                        </div>

                        <!-- 教育背景 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-mortarboard me-2"></i>教育背景
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label for="education" class="form-label">学历</label>
                                <select class="form-select" id="education" name="education">
                                    <option value="">请选择</option>
                                    <option value="博士" {% if resume and resume.education == '博士' %}selected{% endif %}>博士</option>
                                    <option value="硕士" {% if resume and resume.education == '硕士' %}selected{% endif %}>硕士</option>
                                    <option value="本科" {% if resume and resume.education == '本科' %}selected{% endif %}>本科</option>
                                    <option value="大专" {% if resume and resume.education == '大专' %}selected{% endif %}>大专</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="school" class="form-label">学校</label>
                                <input type="text" class="form-control" id="school" name="school"
                                       placeholder="毕业院校" value="{{ resume.school if resume else '' }}">
                            </div>
                            <div class="col-md-4">
                                <label for="major" class="form-label">专业</label>
                                <input type="text" class="form-control" id="major" name="major"
                                       placeholder="所学专业" value="{{ resume.major if resume else '' }}">
                            </div>
                        </div>

                        <!-- 技能 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-stars me-2"></i>技能特长
                        </h6>
                        <div class="mb-4">
                            <label for="skills" class="form-label">技能标签</label>
                            <textarea class="form-control" id="skills" name="skills" rows="2"
                                      placeholder="例如：Python, Java, 数据分析, 机器学习...">{{ resume.skills if resume else '' }}</textarea>
                            <div class="form-text">多个技能请用逗号分隔</div>
                        </div>

                        <!-- 项目经验 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-folder me-2"></i>项目经验
                        </h6>
                        <div class="mb-4">
                            <label for="project_exp" class="form-label">项目经历</label>
                            <textarea class="form-control" id="project_exp" name="project_exp" rows="4"
                                      placeholder="描述您参与的项目、担任的角色、取得的成果...">{{ resume.project_exp if resume else '' }}</textarea>
                        </div>

                        <!-- 实习经验 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-briefcase me-2"></i>实习经验
                        </h6>
                        <div class="mb-4">
                            <label for="internship_exp" class="form-label">实习经历</label>
                            <textarea class="form-control" id="internship_exp" name="internship_exp" rows="4"
                                      placeholder="描述您的实习经历、工作内容、收获与成长...">{{ resume.internship_exp if resume else '' }}</textarea>
                        </div>

                        <!-- 获奖情况 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-award me-2"></i>荣誉奖项
                        </h6>
                        <div class="mb-4">
                            <label for="awards" class="form-label">获奖情况</label>
                            <textarea class="form-control" id="awards" name="awards" rows="2"
                                      placeholder="奖学金、竞赛获奖、荣誉称号...">{{ resume.awards if resume else '' }}</textarea>
                        </div>

                        <!-- 自我评价 -->
                        <h6 class="text-primary mb-3 border-bottom pb-2">
                            <i class="bi bi-chat-square-text me-2"></i>自我评价
                        </h6>
                        <div class="mb-4">
                            <label for="self_eval" class="form-label">个人总结</label>
                            <textarea class="form-control" id="self_eval" name="self_eval" rows="3"
                                      placeholder="简要介绍您的优势、特点和职业规划...">{{ resume.self_eval if resume else '' }}</textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <a href="{{ url_for('seeker.job_seeker_resumes') }}" class="btn btn-outline-secondary btn-lg px-5">
                                取消
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="bi bi-save me-2"></i>{% if resume %}保存修改{% else %}创建简历{% endif %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
